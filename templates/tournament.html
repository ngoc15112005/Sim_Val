{% extends "base.html" %}
{% block title %}{{ tour.name }}{% endblock %}
{% block content %}

<div class="tour-header">
  <h1>[{{ tour.type.upper() }}] {{ tour.name }}</h1>
  <div class="tour-actions">
    <span class="badge {{ tour.status }}">{{ tour.status }}</span>
    <button id="btn-progress" onclick="progressTournament()">Proceed</button>
    <button id="btn-sim-all" onclick="simAll()" class="btn-primary">Sim All</button>
    <button onclick="location.reload()">Refresh</button>
  </div>
</div>

<div id="tour-data" data-id="{{ tour.id }}"></div>

<div class="two-col">
  <section class="card">
    <h2>Bracket</h2>
    <div id="bracket" class="bracket">Dang tai...</div>
  </section>

  <section>
    <div class="card">
      <h2>Participants</h2>
      <div id="participants">Dang tai...</div>
    </div>

    <div class="card" id="manual-card" style="display:none;">
      <h2>Nhap tay</h2>
      <div id="manual-form"></div>
    </div>
  </section>
</div>

{% endblock %}

{% block scripts %}
<script>
let tourData = null;
let activeManualMatch = null;

async function loadTournament() {
    const id = document.getElementById('tour-data').dataset.id;
    tourData = await API.get('/api/tournament/' + id);
    renderParticipants();
    renderBracket();
}

function renderParticipants() {
    const div = document.getElementById('participants');
    if (!tourData || !tourData.participants) {
        div.innerHTML = '<p class="empty">Chua co du lieu.</p>';
        return;
    }
    let html = '<table class="data-table"><tr><th>#</th><th>Team</th><th>Rating</th><th>Hang</th></tr>';
    for (const p of tourData.participants) {
        const rank = p.final_rank ? '#' + p.final_rank : '-';
        html += `<tr>
          <td>${p.seed}</td>
          <td><strong>${p.club.short_code}</strong> ${p.club.name}</td>
          <td>${p.club.current_rating}</td>
          <td>${rank}</td>
        </tr>`;
    }
    html += '</table>';
    div.innerHTML = html;
}

function renderBracket() {
    const div = document.getElementById('bracket');
    if (!tourData || !tourData.matches) {
        div.innerHTML = '<p class="empty">Chua co du lieu.</p>';
        return;
    }

    const groups = { swiss: [], group: [], upper: [], lower: [], grand: [] };

    for (const m of tourData.matches) {
        const t = m.round_type;
        if (groups[t]) groups[t].push(m);
    }

    let html = '';

    if (tourData.tournament.type === 'champion') {
        html += renderGroupStage(groups.group);
    }

    if (groups.swiss.length > 0) {
        html += '<h3 class="round-title">Swiss Stage</h3>';
        html += renderMatchTable(groups.swiss);
    }

    if (groups.upper.length > 0 || groups.lower.length > 0) {
        html += '<h3 class="round-title">Playoffs</h3>';
        html += '<h4>Upper Bracket</h4>';
        html += renderMatchTable(groups.upper);
        html += '<h4>Lower Bracket</h4>';
        html += renderMatchTable(groups.lower);
    }

    if (groups.grand.length > 0) {
        html += '<h4>Grand Final</h4>';
        html += renderMatchTable(groups.grand);
    }

    div.innerHTML = html;

    for (const m of tourData.matches) {
        if (m.status === 'pending' && m.team_a && m.team_b) {
            bindMatchButtons(m);
        }
    }
}

function renderMatchTable(matches) {
    if (!matches || matches.length === 0) return '<p class="empty">Chua co tran nao.</p>';

    let html = '<table class="data-table"><tr><th>#</th><th>Round</th><th>Team A</th><th>Score</th><th>Team B</th><th>Status</th><th>Action</th></tr>';
    for (const m of matches) {
        const taName = m.team_a ? m.team_a.short_code : 'TBD';
        const tbName = m.team_b ? m.team_b.short_code : 'TBD';
        const score = m.team_a_score != null ? `${m.team_a_score} - ${m.team_b_score}` : 'vs';
        const status = m.status === 'completed' ? (m.is_manual ? 'manual' : 'done') : 'pending';
        const statusClass = status;
        const resultText = m.winner_id ? ` (${m.winner_id === (m.team_a ? m.team_a.id : null) ? taName : tbName} win)` : '';

        const mapDetails = m.maps && m.maps.length > 0
            ? m.maps.map(mp => `${mp.team_a_score}-${mp.team_b_score}`).join(', ')
            : '';

        html += `<tr class="match-row ${statusClass}" data-match-id="${m.id}">
          <td>${m.match_order}</td>
          <td>${m.round_name}</td>
          <td class="${m.winner_id === (m.team_a ? m.team_a.id : null) ? 'winner' : ''}">${taName}</td>
          <td class="score" title="${mapDetails}">${score}${resultText}</td>
          <td class="${m.winner_id === (m.team_b ? m.team_b.id : null) ? 'winner' : ''}">${tbName}</td>
          <td><span class="badge-sm ${statusClass}">${status}</span></td>
          <td class="action-cell" data-mid="${m.id}">
            ${m.status === 'pending' && m.team_a && m.team_b
              ? `<button class="btn-sm" onclick="simMatch(${m.id})">Roll</button>
                 <button class="btn-sm btn-manual" onclick="showManual(${m.id})">Nhap</button>`
              : m.status === 'completed' ? `<button class="btn-sm btn-edit" onclick="showManual(${m.id})">Sua</button>` : '-'}
          </td>
        </tr>`;
    }
    html += '</table>';
    return html;
}

function renderGroupStage(matches) {
    if (!matches || matches.length === 0) return '';

    const groupMap = {};
    for (const m of matches) {
        const parts = m.round_name.split('_');
        const grp = parts[0];
        if (!groupMap[grp]) groupMap[grp] = [];
        groupMap[grp].push(m);
    }

    let html = '<h3 class="round-title">Group Stage</h3><div class="groups-container">';
    for (const [grp, ms] of Object.entries(groupMap)) {
        html += `<div class="group-box"><h4>${grp.toUpperCase()}</h4>`;
        html += renderMatchTable(ms);
        html += '</div>';
    }
    html += '</div>';
    return html;
}

function bindMatchButtons(m) {
}

async function simMatch(matchId) {
    if (!confirm('Roll ket qua tran nay?')) return;
    const btn = document.querySelector(`.action-cell[data-mid="${matchId}"] button`);
    if (btn) btn.disabled = true;

    try {
        const result = await API.post(`/api/tournament/${tourData.tournament.id}/match/${matchId}/sim`, {});
        if (result.error) { alert(result.error); return; }
        location.reload();
    } catch (err) {
        alert('Loi: ' + err.message);
    }
}

async function simAll() {
    if (!confirm('Sim toan bo cac tran con lai?')) return;
    const btn = document.getElementById('btn-sim-all');
    btn.disabled = true;
    btn.textContent = 'Dang sim...';
    try {
        await API.post(`/api/tournament/${tourData.tournament.id}/sim-all`, {});
        location.reload();
    } catch (err) {
        alert('Loi: ' + err.message);
    }
    btn.disabled = false;
    btn.textContent = 'Sim All';
}

async function progressTournament() {
    try {
        const result = await API.post(`/api/tournament/${tourData.tournament.id}/progress`, {});
        if (result.error) { alert(result.error); return; }
        location.reload();
    } catch (err) {
        alert('Loi: ' + err.message);
    }
}

function showManual(matchId) {
    const match = tourData.matches.find(m => m.id === matchId);
    if (!match) return;

    activeManualMatch = match;

    const div = document.getElementById('manual-card');
    div.style.display = 'block';

    const taName = match.team_a ? match.team_a.short_code : 'TBD';
    const tbName = match.team_b ? match.team_b.short_code : 'TBD';

    const existingMaps = match.maps || [];
    let mapInputs = '';
    const maxMaps = match.round_type === 'grand' && tourData.tournament.type === 'champion' ? 5 : 3;
    for (let i = 1; i <= maxMaps; i++) {
        const existing = existingMaps[i - 1] || {};
        mapInputs += `<div class="map-input-row">
          <span>Map ${i}:</span>
          <input type="number" class="map-a" value="${existing.team_a_score || ''}" placeholder="?" min="0" max="25">
          <span class="vs-label">-</span>
          <input type="number" class="map-b" value="${existing.team_b_score || ''}" placeholder="?" min="0" max="25">
        </div>`;
    }

    document.getElementById('manual-form').innerHTML = `
      <p><strong>${taName}</strong> vs <strong>${tbName}</strong></p>
      ${mapInputs}
      <div class="form-actions">
        <button onclick="submitManual(${matchId})">Luu</button>
        <button onclick="document.getElementById('manual-card').style.display='none'">Huy</button>
      </div>
    `;
}

async function submitManual(matchId) {
    const mapRows = document.querySelectorAll('.map-input-row');
    const maps = [];
    for (const row of mapRows) {
        const a = parseInt(row.querySelector('.map-a').value);
        const b = parseInt(row.querySelector('.map-b').value);
        if (isNaN(a) || isNaN(b)) continue;
        const winnerId = a > b
            ? (activeManualMatch.team_a ? activeManualMatch.team_a.id : null)
            : (activeManualMatch.team_b ? activeManualMatch.team_b.id : null);
        maps.push({ team_a_score: a, team_b_score: b, winner_id: winnerId });
    }

    if (maps.length === 0) {
        alert('Vui long nhap it nhat 1 map.');
        return;
    }

    const totalWinsA = maps.filter(m => m.winner_id === activeManualMatch.team_a.id).length;
    const totalWinsB = maps.filter(m => m.winner_id === activeManualMatch.team_b.id).length;
    if (totalWinsA === totalWinsB) {
        alert('Ti so map khong the hoa.');
        return;
    }

    try {
        const result = await API.post(`/api/tournament/${tourData.tournament.id}/match/${matchId}/manual`, { maps });
        if (result.error) { alert(result.error); return; }
        location.reload();
    } catch (err) {
        alert('Loi: ' + err.message);
    }
}

loadTournament();
</script>
{% endblock %}
